<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gen 1 Pokédex</title>

    <link rel="stylesheet" href="style.css">

    <!-- Pixel Font -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>

<body>

<div class="pokedex">

    <!-- LEFT SIDE -->

    <div class="left">

        <div class="top">
            <div class="big-light"></div>

            <div class="small-lights">
                <div class="red"></div>
                <div class="yellow"></div>
                <div class="green"></div>
            </div>
        </div>

        <div class="screen">

            <img id="pokemonImage" src="" alt="Pokemon">

        </div>

        <div class="controls">

            <button id="previous">◀</button>

            <button id="playCry">
                🔊 Cry
            </button>

            <button id="next">▶</button>

        </div>

    </div>


    <!-- RIGHT SIDE -->

    <div class="right">

        <h1>Pokédex</h1>

        <div class="searchBox">

            <input
                id="searchInput"
                type="text"
                placeholder="Name or #">

            <button id="searchButton">
                Search
            </button>

        </div>

        <div class="info">

            <h2 id="pokemonName">
                Pokémon
            </h2>

            <h3 id="pokemonNumber">
                #000
            </h3>

            <p id="pokemonDescription">

            </p>

            <div class="types">
                <strong>Type:</strong>
                <span id="pokemonTypes"></span>
            </div>

            <div class="size">
                <p>
                    <strong>Height:</strong>
                    <span id="height"></span>
                </p>

                <p>
                    <strong>Weight:</strong>
                    <span id="weight"></span>
                </p>
            </div>

        </div>

        <div class="stats">

            <h3>Base Stats</h3>

            <div class="stat">
                <span>HP</span>
                <progress id="hp" max="255"></progress>
            </div>

            <div class="stat">
                <span>Attack</span>
                <progress id="attack" max="255"></progress>
            </div>

            <div class="stat">
                <span>Defense</span>
                <progress id="defense" max="255"></progress>
            </div>

            <div class="stat">
                <span>Sp. Atk</span>
                <progress id="specialAttack" max="255"></progress>
            </div>

            <div class="stat">
                <span>Sp. Def</span>
                <progress id="specialDefense" max="255"></progress>
            </div>

            <div class="stat">
                <span>Speed</span>
                <progress id="speed" max="255"></progress>
            </div>

        </div>

        <div class="evolution">

            <h3>Evolution Chain</h3>

            <div id="evolutionChain">

            </div>

        </div>

    </div>

</div>


<audio id="pokemonCry"></audio>

<script src="script.js"></script>

</body>
</html>
